name: Deploy Frontend to Bluehost

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-bluehost
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci || npm install

      - name: Build for production (base = /)
        working-directory: ./frontend
        run: npm run build:prod

      - name: Deploy to Bluehost via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.BLUEHOST_HOST }}
          username: ${{ secrets.BLUEHOST_USER }}
          password: ${{ secrets.BLUEHOST_PASSWORD }}
          server-dir: ${{ secrets.BLUEHOST_PATH }}
          local-dir: ./frontend/docs/
          protocol: ftp
          port: 21
          dangerous-clean-slate: false
          log-level: standard
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
