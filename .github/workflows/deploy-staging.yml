name: Deploy Staging to GitHub Pages

on:
  push:
    branches:
      - dev
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci || npm install

      - name: Build for GitHub Pages (base = /xktradingfloor/)
        working-directory: ./frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.STAGING_API_BASE_URL || 'https://xktradingfloor-backend.onrender.com/api' }}
          VITE_SITE_URL: https://stackified.github.io/xktradingfloor
        run: npm run build:gith

      - name: Strip production CNAME from staging build
        # Otherwise gh-pages serves the CNAME and redirects to xktradingfloor.com
        run: rm -f ./frontend/docs/CNAME

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/docs
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: "chore(staging): deploy ${{ github.sha }}"
